<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGROMIN · Sistema de Control de Costos e Inventario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg: #f3f5ee;
  --bg-alt: #eaede2;
  --panel: #ffffff;
  --panel-2: #eef1e7;
  --line: #dde3d3;
  --line-soft: #e7ecdf;
  --text: #1c2a1f;
  --text-dim: #56695a;
  --text-faint: #8b9a8b;
  --lime: #3c7a2e;
  --lime-dim: #2c5a22;
  --amber: #b8761e;
  --rust: #ab3a2c;
  --sky: #276e6e;
  --mono: 'IBM Plex Mono', monospace;
  --display: 'Space Grotesk', sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background: var(--bg);
  background-image:
    radial-gradient(circle at 15% 0%, rgba(60,122,46,0.05), transparent 40%),
    radial-gradient(circle at 100% 100%, rgba(39,110,110,0.045), transparent 45%);
  color: var(--text);
  font-family: var(--display);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
::selection{ background: var(--lime); color: #f6f8f1; }
::-webkit-scrollbar{ width:10px; height:10px; }
::-webkit-scrollbar-track{ background: var(--bg-alt); }
::-webkit-scrollbar-thumb{ background: var(--line); border-radius:6px; }
::-webkit-scrollbar-thumb:hover{ background: var(--lime-dim); }

a{ color: inherit; }

#app{ display:flex; min-height:100vh; }

/* ---------- SIDEBAR ---------- */
#sidebar{
  width: 272px;
  flex: 0 0 272px;
  background: var(--bg-alt);
  border-right: 1px solid var(--line-soft);
  display:flex;
  flex-direction:column;
  position: sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
}
.brand{
  padding: 22px 20px 16px;
  border-bottom: 1px solid var(--line-soft);
}
.brand-mark{
  display:flex; align-items:center; gap:10px;
}
.brand-dot{
  width:10px; height:10px; border-radius:2px;
  background: var(--lime);
  box-shadow: 0 0 10px rgba(60,122,46,0.35);
  transform: rotate(45deg);
}
.brand-title{
  font-weight:700; font-size:19px; letter-spacing:0.5px;
}
.brand-sub{
  font-family: var(--mono);
  font-size:10.5px;
  color: var(--text-faint);
  margin-top:6px;
  letter-spacing: 0.6px;
  text-transform: uppercase;
}
.nav-section{ padding: 14px 12px 4px; }
.nav-label{
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  color: var(--text-faint);
  text-transform: uppercase;
  padding: 8px 10px 6px;
}
.nav-item{
  display:flex; align-items:center; justify-content:space-between; gap:8px;
  padding: 8px 10px;
  border-radius: 6px;
  font-size: 13.5px;
  color: var(--text-dim);
  cursor:pointer;
  margin: 1px 0;
  border-left: 2px solid transparent;
  transition: background .12s ease, color .12s ease;
}
.nav-item:hover{ background: rgba(60,122,46,0.08); color: var(--text); }
.nav-item.active{
  background: rgba(60,122,46,0.1);
  color: var(--lime);
  border-left: 2px solid var(--lime);
  font-weight:600;
}
.nav-item .tag{
  font-family: var(--mono);
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 999px;
  background: rgba(171,58,44,0.12);
  color: var(--rust);
  min-width: 20px;
  text-align:center;
}
.nav-item .tag.zero{ background: rgba(60,122,46,0.1); color: var(--lime-dim); }
.sidebar-footer{
  margin-top:auto;
  padding: 14px 20px;
  border-top: 1px solid var(--line-soft);
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--text-faint);
  line-height:1.6;
}

/* ---------- MAIN ---------- */
#main{ flex:1; min-width:0; display:flex; flex-direction:column; }

#topbar{
  display:flex; align-items:center; justify-content:space-between;
  gap: 16px;
  padding: 14px 28px;
  border-bottom: 1px solid var(--line-soft);
  position: sticky; top:0; z-index: 20;
  background: rgba(243,245,238,0.9);
  backdrop-filter: blur(8px);
}
.ticker{
  display:flex; gap: 18px; align-items:center;
  font-family: var(--mono);
  font-size: 12.5px;
  color: var(--text-dim);
}
.ticker b{ color: var(--lime); font-weight:600; }
.ticker .sep{ width:1px; height:14px; background: var(--line); }
#search-box{
  flex: 0 0 260px;
  display:flex; align-items:center; gap:8px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 8px 12px;
}
#search-box input{
  background:none; border:none; outline:none; color: var(--text);
  font-family: var(--mono); font-size: 12.5px; width:100%;
}
#search-box input::placeholder{ color: var(--text-faint); }

#content{ padding: 26px 30px 60px; max-width: 1280px; width:100%; margin:0 auto; }

/* ---------- COMMON PIECES ---------- */
.view-header{ margin-bottom: 22px; }
.eyebrow{
  font-family: var(--mono); font-size: 11px; letter-spacing: 1.6px;
  text-transform: uppercase; color: var(--lime-dim); margin-bottom:6px;
}
.view-title{ font-size: 26px; font-weight:700; letter-spacing:0.2px; }
.view-desc{ color: var(--text-dim); font-size: 13.5px; margin-top:6px; max-width: 680px; line-height:1.5; }

.kpi-grid{
  display:grid; grid-template-columns: repeat(auto-fit, minmax(190px,1fr));
  gap: 12px; margin-bottom: 24px;
}
.kpi-card{
  background: var(--panel);
  border: 1px solid var(--line-soft);
  border-radius: 10px;
  padding: 16px 18px;
  position:relative;
  overflow:hidden;
  box-shadow: 0 1px 2px rgba(28,42,31,0.04);
}
.kpi-card::before{
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background: var(--lime-dim);
}
.kpi-card.warn::before{ background: var(--amber); }
.kpi-card.danger::before{ background: var(--rust); }
.kpi-card.info::before{ background: var(--sky); }
.kpi-label{
  font-family: var(--mono); font-size: 10.5px; letter-spacing:0.8px;
  text-transform: uppercase; color: var(--text-faint);
}
.kpi-value{
  font-family: var(--mono); font-size: 22px; font-weight:600; margin-top: 8px;
  color: var(--text);
}
.kpi-value.lime{ color: var(--lime); }
.kpi-value.amber{ color: var(--amber); }
.kpi-value.rust{ color: var(--rust); }
.kpi-sub{ font-size: 11px; color: var(--text-faint); margin-top:4px; }

.panel{
  background: var(--panel);
  border: 1px solid var(--line-soft);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 22px;
  box-shadow: 0 1px 2px rgba(28,42,31,0.04);
}
.panel-title{
  font-size: 14.5px; font-weight:600; margin-bottom: 14px;
  display:flex; align-items:center; justify-content:space-between;
}
.panel-title .hint{ font-family: var(--mono); font-size: 10.5px; color: var(--text-faint); font-weight:400; }

.chart-row{ display:grid; grid-template-columns: 1.3fr 1fr; gap: 18px; }
@media (max-width: 980px){ .chart-row{ grid-template-columns: 1fr; } }
.chart-wrap{ position:relative; height: 300px; }
.chart-wrap.small{ height: 240px; }

table.data-table{ width:100%; border-collapse: collapse; font-size: 12.8px; }
table.data-table thead th{
  text-align:left; padding: 9px 10px; font-family: var(--mono);
  font-size: 10.5px; text-transform:uppercase; letter-spacing:0.5px;
  color: var(--text-faint); border-bottom: 1px solid var(--line);
  cursor:pointer; user-select:none; white-space:nowrap;
}
table.data-table thead th:hover{ color: var(--lime); }
table.data-table thead th.sorted-asc::after{ content:' ▲'; color: var(--lime); }
table.data-table thead th.sorted-desc::after{ content:' ▼'; color: var(--lime); }
table.data-table tbody td{
  padding: 9px 10px; border-bottom: 1px solid var(--line-soft);
  font-family: var(--mono); white-space:nowrap;
}
table.data-table tbody td.prod-name{
  white-space: normal; font-family: var(--display); font-size:13px; color: var(--text);
  min-width: 200px;
}
table.data-table tbody tr:hover{ background: rgba(60,122,46,0.05); }
.num{ text-align:right; }
.num.neg{ color: var(--rust); }
.num.pos{ color: var(--lime); }
.money-cell{ color: var(--text); }
.flete-cell{ color: #b48ead; font-weight:600; }
.renta-cell{ color: #d6ac00; font-weight:600; }

.pill{
  display:inline-block; padding: 3px 9px; border-radius:999px;
  font-family: var(--mono); font-size: 10.5px; font-weight:600;
  letter-spacing:0.3px;
}
.pill.optimo{ background: rgba(60,122,46,0.13); color: var(--lime); }
.pill.bajo{ background: rgba(184,118,30,0.15); color: var(--amber); }
.pill.other{ background: rgba(39,110,110,0.14); color: var(--sky); }

.table-toolbar{
  display:flex; align-items:center; justify-content:space-between;
  gap:12px; margin-bottom: 16px; flex-wrap: wrap;
}
.filter-panel{
  display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  background: var(--panel-2);
  border: 1px solid var(--line-soft);
  border-radius: 14px;
  padding: 14px 16px;
  width:100%;
}
.filter-panel label{
  font-family: var(--mono); font-size: 11px; color: var(--text-faint);
  text-transform: uppercase; letter-spacing:0.5px;
}
.filter-panel input,
.filter-panel select{
  background: var(--panel); border:1px solid var(--line);
  border-radius: 10px; padding: 8px 12px;
  color: var(--text); font-family: var(--mono); font-size:12px;
  min-width: 140px;
}
.filter-panel input{
  flex:1 1 200px;
}
.filter-panel .filter-group{
  display:flex; flex-direction:column; gap:4px;
}
.filter-chip{
  display:inline-flex; align-items:center; gap:6px;
  background: var(--panel); border:1px solid var(--line);
  border-radius: 999px; padding: 6px 10px;
  font-family: var(--mono); font-size:12px; color: var(--text-dim);
  cursor:pointer;
  transition: background .15s, border-color .15s, color .15s;
}
.filter-chip:hover{ background: rgba(60,122,46,0.08); border-color: var(--lime); color: var(--text); }
.filter-chip.active{ background: var(--lime); border-color: var(--lime); color: #f6f8f1; }
.mini-search{
  display:flex; align-items:center; gap:6px;
  background: var(--panel-2); border:1px solid var(--line);
  border-radius: 8px; padding: 6px 10px;
}
.mini-search input{
  background:none;border:none;outline:none;color:var(--text);
  font-family: var(--mono); font-size:12px; width:180px;
}

.pagination-footer{
  display:flex; justify-content:space-between; flex-wrap:wrap; align-items:center;
  margin-top: 14px; gap: 12px; padding: 14px 16px; border-top: 1px solid var(--line-soft);
  background: rgba(255,255,255,0.04);
  border-radius: 0 0 12px 12px;
}
.pagination-info{
  font-family: var(--mono); color: var(--text-faint); font-size: 12px;
}
.pagination-controls{
  display:flex; align-items:center; gap: 10px; flex-wrap:wrap;
}
.pagination-controls button{
  min-width: 120px; padding: 8px 12px; font-size: 12px;
}
.page-size-selector{
  display:flex; align-items:center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-faint);
}
.page-size-selector select{
  background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px;
  color: var(--text); font-family: var(--mono); font-size: 12px;
}

.table-scroll{ overflow-x:auto; }

.company-grid{
  display:grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
  gap: 12px;
}
.company-card{
  background: var(--panel); border:1px solid var(--line-soft); border-radius:10px;
  padding: 16px; cursor:pointer; transition: border-color .15s, transform .1s, box-shadow .15s;
  box-shadow: 0 1px 2px rgba(28,42,31,0.04);
}
.company-card:hover{ border-color: var(--lime-dim); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(28,42,31,0.08); }
.company-card .cname{ font-weight:600; font-size:14px; margin-bottom:10px; }
.company-card .crow{ display:flex; justify-content:space-between; font-family:var(--mono); font-size:11.5px; color:var(--text-dim); margin-top:5px;}
.company-card .crow b{ color: var(--text); }

.calc-box{
  display:flex; gap:14px; align-items:flex-end; flex-wrap:wrap;
}
.calc-field label{
  display:block; font-family: var(--mono); font-size:10.5px; color:var(--text-faint);
  text-transform:uppercase; margin-bottom:6px; letter-spacing:0.5px;
}
.calc-field input{
  background: var(--panel-2); border:1px solid var(--line); border-radius:8px;
  padding: 9px 12px; color: var(--text); font-family: var(--mono); font-size: 14px; width:160px;
}
.calc-result{ font-family:var(--mono); font-size:14px; color: var(--lime); padding: 9px 0; }

.footnote{ color: var(--text-faint); font-size:11.5px; margin-top: 8px; font-family: var(--mono); }

/* ---------- GASTOS Y DEDUCCIONES (tabla independiente y editable) ---------- */
.panel.gastos-panel{ border-top: 3px solid var(--amber); }
.gastos-input{
  width:100%; background: transparent; border:none; outline:none;
  font-family: var(--mono); font-size: 12.8px; color: var(--text);
  padding: 4px 2px; border-radius: 4px;
}
.gastos-input:focus{ background: var(--panel-2); }
.gastos-input.monto{ text-align:right; }
.gastos-input::placeholder{ color: var(--text-faint); }
#gastosTable tfoot td{
  padding: 10px; font-family: var(--mono); font-weight:700; border-top: 2px solid var(--line);
  color: var(--text);
}
.gasto-del{
  background:none; border:1px solid var(--line); color: var(--rust);
  border-radius:6px; width:26px; height:26px; cursor:pointer; font-size:14px;
  line-height:1; display:flex; align-items:center; justify-content:center;
}
.gasto-del:hover{ background: rgba(171,58,44,0.1); border-color: var(--rust); }
.btn-add-gasto{
  margin-top: 12px;
  font-family: var(--mono); font-size: 12px; letter-spacing:0.3px;
  background: var(--panel-2); border: 1px dashed var(--lime-dim); color: var(--lime-dim);
  border-radius: 8px; padding: 9px 16px; cursor:pointer; font-weight:600;
}
.btn-add-gasto:hover{ background: rgba(60,122,46,0.1); }

/* ---------- ACCIONES (iconos ver / editar / eliminar) ---------- */
.actions-cell{ white-space:nowrap; }
.icon-btn{
  width: 30px; height:30px; border-radius:7px;
  border: 1px solid var(--line); background: var(--panel-2);
  color: var(--text-dim); cursor:pointer;
  display:inline-flex; align-items:center; justify-content:center;
  margin-right: 6px; transition: all .12s ease;
}
.icon-btn:last-child{ margin-right:0; }
.icon-btn.detail-btn:hover{ border-color: var(--sky); color: var(--sky); background: rgba(39,110,110,0.08); }
.icon-btn.edit-btn:hover{ border-color: var(--lime-dim); color: var(--lime-dim); background: rgba(60,122,46,0.08); }
.icon-btn.delete-btn:hover{ border-color: var(--rust); color: var(--rust); background: rgba(171,58,44,0.1); }
.icon-btn.restore-btn:hover{ border-color: var(--amber); color: var(--amber); background: rgba(184,118,30,0.12); }
.btn-ghost{
  border: 1px solid var(--line); background: var(--panel-2); color: var(--text-dim);
  border-radius: 8px; padding: 8px 12px; font-family: var(--mono); font-size: 11px;
  cursor:pointer; font-weight:600;
}
.btn-ghost:hover{ color: var(--text); border-color: var(--lime-dim); }
.inactive-panel{ border-top: 3px solid var(--amber); }
.inactive-wrap{ margin-top: 10px; }
.empty-state{ padding: 16px; text-align:center; color: var(--text-faint); font-family: var(--mono); font-size:12px; }
.agromin-swal{ border-radius: 12px !important; }
.agromin-swal .swal2-title{ font-size: 16px !important; }
.agromin-swal .swal2-html-container{ font-size: 13px !important; }

/* ---------- MODAL ---------- */
.modal-overlay{
  position: fixed; inset:0; background: rgba(28,42,31,0.35);
  display:none; align-items:center; justify-content:center;
  z-index: 200; padding: 20px; backdrop-filter: blur(2px);
}
.modal-overlay.open{ display:flex; }
.modal-card{
  background: var(--panel); border-radius: 14px; border: 1px solid var(--line-soft);
  max-width: 560px; width:100%; max-height: 86vh; overflow-y:auto;
  padding: 26px 26px 24px; position:relative;
  box-shadow: 0 20px 50px rgba(28,42,31,0.18);
}
.modal-close{
  position:absolute; top:16px; right:16px; width:30px; height:30px;
  border-radius:8px; border:1px solid var(--line); background: var(--panel-2);
  color: var(--text-dim); cursor:pointer; font-size:18px; line-height:1;
  display:flex; align-items:center; justify-content:center;
}
.modal-close:hover{ color: var(--rust); border-color: var(--rust); }
.modal-eyebrow{
  font-family: var(--mono); font-size:10.5px; letter-spacing:1.4px; text-transform:uppercase;
  color: var(--lime-dim); margin-bottom:6px;
}
.modal-title{ font-size:19px; font-weight:700; margin-bottom: 4px; padding-right: 30px; }
.modal-sub{ font-size:12.5px; color: var(--text-dim); margin-bottom: 18px; }
.detail-grid{
  display:grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.detail-item{
  background: var(--panel-2); border:1px solid var(--line-soft); border-radius:10px;
  padding: 12px 14px;
}
.detail-item .dlabel{
  font-family: var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:0.6px;
  color: var(--text-faint); margin-bottom:5px;
}
.detail-item .dvalue{ font-family: var(--mono); font-size:16px; font-weight:600; color: var(--text); }
.detail-item .dvalue.pos{ color: var(--lime); }
.detail-item .dvalue.neg{ color: var(--rust); }
.form-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:14px; margin-bottom: 18px; }
.form-field{ display:flex; flex-direction:column; gap:6px; }
.form-field.full{ grid-column: 1 / -1; }
.form-field label{
  font-family: var(--mono); font-size:10.5px; text-transform:uppercase;
  letter-spacing:0.5px; color: var(--text-faint);
}
.form-field input{
  background: var(--panel-2); border:1px solid var(--line); border-radius:8px;
  padding: 9px 12px; color: var(--text); font-family: var(--mono); font-size:13.5px;
}
.form-field input:focus{ outline:none; border-color: var(--lime-dim); }
.modal-actions{ display:flex; gap:10px; justify-content:flex-end; margin-top: 6px; }
.btn-primary{
  background: var(--lime); color:#f6f8f1; border:none; border-radius:8px;
  padding: 10px 20px; font-family: var(--display); font-weight:600; font-size:13.5px; cursor:pointer;
}
.btn-primary:hover{ background: var(--lime-dim); }
.btn-secondary{
  background: var(--panel-2); color: var(--text-dim); border:1px solid var(--line); border-radius:8px;
  padding: 10px 18px; font-family: var(--display); font-weight:600; font-size:13.5px; cursor:pointer;
}
.btn-secondary:hover{ color: var(--text); }
.logout-btn{
  background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
  color: #b91c1c;
  border: 1px solid #fca5a5;
  box-shadow: 0 2px 6px rgba(185, 28, 28, 0.12);
}
.logout-btn:hover{
  color: #991b1b;
  background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
}
.user-dropdown{
  position: relative;
  display: flex;
  align-items: center;
}
.user-menu-btn{
  background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 14px; font-family: var(--display); font-weight: 600;
  font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px;
  transition: all 0.2s ease;
}
.user-menu-btn:hover{
  border-color: var(--lime-dim); color: var(--lime-dim);
}
.user-icon{ font-size: 16px; }
.user-name{ max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.menu-caret{ font-size: 10px; transition: transform 0.2s; }
.user-menu-btn:hover .menu-caret{ transform: translateY(2px); }
.user-menu-content{
  position: absolute; top: 100%; right: 0; margin-top: 6px;
  background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px;

}
.user-menu-content.open{
  display: flex;
}
.menu-item{
  background: none; border: none; color: var(--text); padding: 12px 14px;
  font-family: var(--display); font-size: 13px; cursor: pointer; text-align: left;
  transition: all 0.15s ease;
}
.menu-item:first-child{
  border-radius: 8px 8px 0 0;
}
.menu-item:hover{
  background: var(--panel); color: var(--lime-dim);
}
.menu-divider{
  height: 1px; background: var(--line); margin: 6px 0;
}
.logout-item{
  border-radius: 0 0 8px 8px;
  color: #b91c1c;
}
.logout-item:hover{
  background: linear-gradient(90deg, rgba(185, 28, 28, 0.08), transparent);
  color: #991b1b;
}
.preview-note{
  font-family: var(--mono); font-size:11px; color: var(--text-faint); margin: -6px 0 14px;
}

.badge-schema{
  font-family: var(--mono); font-size:10px; padding:2px 8px; border-radius:6px;
  border:1px solid var(--line); color: var(--text-faint); text-transform:uppercase;
}

  #app{ flex-direction: column; }

  .menu-btn{ display:flex !important; }

function ensureProductIdentity(product, supplierName, index){
  if (!product._uid) product._uid = `${supplierName}-${index}-${Math.random().toString(36).slice(2,8)}`;
  if (product.isActive === undefined) product.isActive = true;
  if (product.deletedAt === undefined) product.deletedAt = null;
  return product;
}
function normalizeData(data){
  const normalized = cloneData(data || BASE_DATA);
  if (!normalized.cambioDolar) normalized.cambioDolar = cloneData(BASE_DATA.cambioDolar);
  normalized.suppliers = (normalized.suppliers || []).map((s, idx) => {
    const baseSupplier = BASE_DATA.suppliers?.[idx] || {};
    const supplier = { ...cloneData(baseSupplier), ...s };
    supplier.products = Array.isArray(supplier.products) ? supplier.products : [];
    supplier.inactiveProducts = Array.isArray(supplier.inactiveProducts) ? supplier.inactiveProducts : [];
    supplier.products = supplier.products.map((p, pIdx) => {
      const prod = { ...(baseSupplier.products?.[pIdx] || {}), ...p };
      ensureProductIdentity(prod, supplier.name || `Proveedor ${idx + 1}`, pIdx);
      prod.isActive = true;
      prod.deletedAt = null;
      prod.prevStock = prod.prevStock ?? (prod.stock || 0);
      prod.lotes = Array.isArray(prod.lotes) ? prod.lotes : [];
      prod.ventas = Array.isArray(prod.ventas) ? prod.ventas : [];
      prod.ventas = prod.ventas.filter(v => v && typeof v === 'object').map(v => ({ ...v, cantidad: Number(v.cantidad) || 0 }));
      prod.ventasTotal = getSalesTotal(prod);
      prod.ultimaVenta = prod.ventas.length ? prod.ventas[prod.ventas.length - 1].fecha : null;
      return prod;
    });
    supplier.inactiveProducts = supplier.inactiveProducts.map((p, pIdx) => {
      const prod = { ...(baseSupplier.products?.[pIdx] || {}), ...p };
      ensureProductIdentity(prod, supplier.name || `Proveedor ${idx + 1}`, pIdx);
      prod.isActive = false;
      if (!prod.deletedAt) prod.deletedAt = new Date().toISOString();
      prod.prevStock = prod.prevStock ?? (prod.stock || 0);
      prod.lotes = Array.isArray(prod.lotes) ? prod.lotes : [];
      return prod;
    });
    supplier.meta = { ...(baseSupplier.meta || {}), ...(supplier.meta || {}) };
    return supplier;
  });
  return normalized;
}
function cleanupLoadedSuppliers(normalized){
  try{
    const before = (normalized.suppliers || []).length;
    normalized.suppliers = (normalized.suppliers || []).filter(s => {
      const name = (s.name || '').toString();
      const isPlaceholder = /^Nueva empresa\s*\d*$/i.test(name);
      const hasProducts = Array.isArray(s.products) && s.products.length > 0;
      return !(isPlaceholder && !hasProducts);
    });
    const after = (normalized.suppliers || []).length;
    if (after < before){
      try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(normalized)); } catch(e){}
    }
  } catch(e){}
  return normalized;
}

function getSalesRecent(product, days = 7){
  const cutoff = Date.now() - (days * 24 * 60 * 60 * 1000);
  return getProductSales(product).reduce((a, v) => {
    const ts = Date.parse(v.fecha || '');
    if (!Number.isNaN(ts) && ts >= cutoff) return a + (Number(v.cantidad) || 0);
    return a;
  }, 0);
}
function getSalesVelocity(product, days = 30){
  const total = getSalesTotal(product);
  if (total <= 0) return 0;
  const sales = getProductSales(product);
  if (!sales.length) return 0;
  const dates = sales.map(v => Date.parse(v.fecha || '')).filter(ts => !Number.isNaN(ts)).sort((a, b) => a - b);
  if (!dates.length) return total;
  const spanDays = Math.max(1, (Date.now() - dates[0]) / (24 * 60 * 60 * 1000));
  return total / Math.min(days, spanDays || days);
}

/* ---------------------------------------------------------------------
   MOTOR DE RECÁLCULO POR TIPO DE CAMBIO
   Replica las fórmulas reales del Excel original:
   - Esquema USD:  costoUnit = precioOrigUSD*TC + flete + rentaProd
                   rentaProd = (precioOrigUSD*TC) * tasaImpuestoRenta
                   montoBrutoUSD = precioOrigUSD * stock   (no depende del TC)
                   montoBrutoSoles = montoBrutoUSD * TC
                   imptoRenta = montoBrutoSoles * tasaImpuestoRenta
   - Esquema TON:  precioUnitUSD = precioTonUSD / bolsasTon
                   costoUnit = precioUnitUSD*TC + flete + impuestoBolsa
                   montoBrutoUSD = precioUnitUSD * stock
                   montoBrutoSoles = montoBrutoUSD * TC
                   imptoRenta = montoBrutoSoles * tasaImpuestoRenta
   - Esquema SOLES (ABC MAX): todo ya está en soles, el TC no afecta nada.
   diferencia = precioSistema - costoUnit  (margen; positivo = gana, negativo = pierde)
--------------------------------------------------------------------- */

function recalcSupplierMeta(s){
  const sumMontoBruto = s.products.reduce((a,p)=>a+(p.montoBrutoSoles||0), 0);
  const sumImpto = s.products.reduce((a,p)=>a+(p.imptoRenta||0), 0);
  const gastosTotal = loadGastos(s.name).reduce((a,g)=>a+(parseFloat(g.monto)||0), 0);
  s.meta.ingresoBruto = sumMontoBruto;
  s.meta.totalDeducciones = sumImpto + gastosTotal;
  s.meta.utilidadNeta = s.meta.ingresoBruto - s.meta.totalDeducciones;
  saveState();
}

/* Recalcula un único producto tras editarlo manualmente (mismas fórmulas del Excel) */
function recalcSingleProduct(s, p){
  const tc = s.meta.tcComercial;
  const rate = (typeof s.meta.impuestoRenta === 'number') ? s.meta.impuestoRenta : 0.02;

  if (s.schema === 'USD'){
    const base = (p.precioOrigUSD||0) * tc;
    p.rentaProd = base * rate;
    p.costoUnit = base + (p.flete||0) + p.rentaProd;
    p.montoBrutoUSD = (p.precioOrigUSD||0) * (p.stock||0);
    p.montoBrutoSoles = p.montoBrutoUSD * tc;
    p.imptoRenta = p.montoBrutoSoles * rate;
  } else if (s.schema === 'TON'){
    const unitUSD = p.bolsasTon ? (p.precioTonUSD||0) / p.bolsasTon : 0;
    const base = unitUSD * tc;
    p.costoUnit = base + (p.flete||0) + (p.impuestoBolsa||0);
    p.montoBrutoUSD = unitUSD * (p.stock||0);
    p.montoBrutoSoles = p.montoBrutoUSD * tc;
    p.imptoRenta = p.montoBrutoSoles * rate;
  } else { // SOLES
    p.rentaProd = (p.precioCompra||0) * rate;
    p.costoUnit = (p.precioCompra||0) + (p.flete||0) + p.rentaProd;
    p.montoBrutoSoles = p.costoUnit * (p.stock||0);
    p.imptoRenta = p.montoBrutoSoles * rate;
  }
  p.diferencia = (p.precioSistema||0) - p.costoUnit;
  p.estadoStock = (p.stock||0) < 15 ? 'STOCK BAJO' : 'OPTIMO';
}

function recalcSupplier(s, tcComercial){
  const rate = (typeof s.meta.impuestoRenta === 'number') ? s.meta.impuestoRenta : 0.02;

  if (s.schema === 'USD'){
    s.products.forEach(p => {
      const base = (p.precioOrigUSD||0) * tcComercial;
      p.rentaProd = base * rate;
      p.costoUnit = base + (p.flete||0) + p.rentaProd;
      p.montoBrutoUSD = (p.precioOrigUSD||0) * (p.stock||0);
      p.montoBrutoSoles = p.montoBrutoUSD * tcComercial;
      p.imptoRenta = p.montoBrutoSoles * rate;
      p.diferencia = (p.precioSistema||0) - p.costoUnit;
    });
  } else if (s.schema === 'TON'){
    s.products.forEach(p => {
      const unitUSD = p.bolsasTon ? (p.precioTonUSD||0) / p.bolsasTon : 0;
      const base = unitUSD * tcComercial;
      p.costoUnit = base + (p.flete||0) + (p.impuestoBolsa||0);
      p.montoBrutoUSD = unitUSD * (p.stock||0);
      p.montoBrutoSoles = p.montoBrutoUSD * tcComercial;
      p.imptoRenta = p.montoBrutoSoles * rate;
      p.diferencia = (p.precioSistema||0) - p.costoUnit;
    });
  }
  // Esquema SOLES: sin cambios, ya está en soles.

  s.meta.tcComercial = tcComercial;
  recalcSupplierMeta(s);
}

function recalcAll(tcComercial, tcSunat){
  DATA.cambioDolar.tcComercial = tcComercial;
  DATA.cambioDolar.tcSunat = tcSunat;
  SUPPLIERS.forEach(s => recalcSupplier(s, tcComercial));
  saveState();
}

// Recalcular una sola vez al iniciar, para que cualquier gasto guardado
// previamente en este navegador ya quede reflejado en las utilidades.
function initialRecalc(){

function moveToInactive(s, product){
  const idx = s.products.findIndex(p => (p._uid && product._uid) ? p._uid === product._uid : p === product);
  if (idx < 0) return false;
  const [removed] = s.products.splice(idx, 1);
  removed.isActive = false;
  removed.deletedAt = new Date().toISOString();
  s.inactiveProducts = s.inactiveProducts || [];
  s.inactiveProducts.push(removed);
  recalcSupplierMeta(s);
  saveState();
  return true;
}

function restoreFromInactive(s, uid){
  const idx = (s.inactiveProducts || []).findIndex(p => (p._uid || '') === uid);
  if (idx < 0) return false;
  const [removed] = s.inactiveProducts.splice(idx, 1);
  removed.isActive = true;
  removed.deletedAt = null;
  s.products.push(removed);
  recalcSupplierMeta(s);
  saveState();
  return true;
}

                    throw new Error('El archivo no contiene un respaldo válido.');

                  const normalized = cleanupLoadedSuppliers(normalizeData(incoming));

/* ---------------------------- ROUTER ---------------------------- */

function navigate(route){
  window.location.hash = route;
}
window.addEventListener('hashchange', () => render());

function render(){
  let route = (window.location.hash || '#dashboard').slice(1);
  const content = document.getElementById('content');

  if (isAuthenticated() && route === 'login'){
    route = 'dashboard';
    window.location.hash = 'dashboard';
  }

  if (!isAuthenticated()){
    clearAuth();
    document.getElementById('sidebar').style.display = 'none';
    document.getElementById('topbar').style.display = 'none';
    setActiveNav('__none__');
    destroyCharts();
    content.innerHTML = viewLogin();
    attachLoginBehavior();
    return;
  }

  updateLastActivity();
  document.getElementById('sidebar').style.display = 'block';
  document.getElementById('topbar').style.display = 'flex';

  if (route.startsWith('search:')){
    destroyCharts();
    setActiveNav('__none__');
    content.innerHTML = viewGlobalSearch(decodeURIComponent(route.split(':')[1]));
    return;
  }

  // Limpiar búsqueda cuando se navega a otras vistas
  const searchInput = document.getElementById('globalSearch');
  if (searchInput) searchInput.value = '';

  setActiveNav(route);
  destroyCharts();
  if (route === 'dashboard') content.innerHTML = viewDashboard();
  else if (route === 'ventas') {
    content.innerHTML = viewVentas();
    attachVentasBehavior();
    return;
  }
  else if (route === 'stockbajo') content.innerHTML = viewStockBajo();
  else if (route === 'cambio') content.innerHTML = viewCambio();
  else if (route === 'precios') {
    content.innerHTML = viewPriceSchemas();
    attachPriceSchemaBehavior();
    return;
  }
  else if (route === 'new-supplier'){
    content.innerHTML = viewNewSupplier();
    attachNewSupplierForm();
    return;
  } else if (route.startsWith('sup-lotes:')) {
    const parts = route.split(':');
    const idx = parseInt(parts[1], 10);
    const pi = parseInt(parts[2], 10);
    content.innerHTML = viewProductLots(SUPPLIERS[idx], idx, pi);
    attachProductLotsBehavior(SUPPLIERS[idx], idx, pi);
    return;
  } else if (route.startsWith('sup-inactivos:')) {
    const idx = parseInt(route.split(':')[1], 10);
    content.innerHTML = viewInactiveSupplier(SUPPLIERS[idx], idx);
    attachInactiveSupplierBehavior(idx);
    return;
  } else if (route.startsWith('sup:')) {
    const idx = parseInt(route.split(':')[1], 10);
    content.innerHTML = viewSupplier(SUPPLIERS[idx], idx);
    attachSupplierBehavior(idx);
    attachSupplierCharts(SUPPLIERS[idx]);
    attachGastosPanel(SUPPLIERS[idx]);
    return;
  } else {
    content.innerHTML = viewDashboard();
  }
  if (route === 'dashboard') attachDashboardCharts();
  if (route === 'cambio') { attachCambioUpdate(); attachCambioCalc(); }
  if (route === 'stockbajo') { attachStockBajoChart(); attachStockBajoBehavior(); }
}

function attachLoginBehavior(){
  const loginBtn = document.getElementById('loginSubmit');
  const userInput = document.getElementById('loginUser');
  const passInput = document.getElementById('loginPass');
  if (!loginBtn || !userInput || !passInput) return;

  const tryLogin = async () => {
    const enteredUser = userInput.value.trim();
    const userKey = findUserKey(enteredUser);
    const pass = passInput.value.trim();

    if (!userKey || !pass){
      Swal.fire({ title: 'Acceso denegado', text: 'Usuario o contraseña incorrectos.', icon: 'error', customClass: { popup: 'agromin-swal' } });
      return;
    }

    const email = USER_EMAIL_MAP[userKey];
    loginBtn.disabled = true;
    loginBtn.textContent = 'Ingresando…';

    try {
      // Autenticar con Supabase
      const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pass });

      if (error || !data?.session){
        // Fallback offline: credencial local de AGROMIN
        const FALLBACK = { AGROMIN: '123' };
        if (FALLBACK[userKey] === pass){
          localStorage.setItem(AUTH_KEY, userKey);
          localStorage.setItem(AUTH_LAST_ACTIVITY, String(Date.now()));
          window.location.hash = 'dashboard';
          buildNav(); buildTopbar(); render();
          showToast('warning', 'Modo offline', 'Sin conexión a la nube. Los cambios se sincronizarán al reconectarte.');
        } else {
          Swal.fire({ title: 'Acceso denegado', text: error?.message || 'Usuario o contraseña incorrectos.', icon: 'error', customClass: { popup: 'agromin-swal' } });
        }
        return;
      }

      // Login exitoso con Supabase — onAuthStateChange maneja el resto
      _sbSession = data.session;
      localStorage.setItem(AUTH_KEY, userKey);
      localStorage.setItem(AUTH_LAST_ACTIVITY, String(Date.now()));

      // Cargar datos desde la nube
      showToast('info', 'Cargando datos…', 'Sincronizando con la nube.');
      await loadFromCloud();
      window.location.hash = 'dashboard';
      buildNav(); buildTopbar(); render();

    } catch(e){
      Swal.fire({ title: 'Error de conexión', text: 'No se pudo conectar con el servidor.', icon: 'error', customClass: { popup: 'agromin-swal' } });
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Ingresar';
    }
  };

  loginBtn.addEventListener('click', tryLogin);
  userInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
  passInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
}

function setupAuthActivityWatcher(){
  const refresh = () => {
    if (isAuthenticated()){
      updateLastActivity();
    }
  };
  ['click','keydown','mousemove','scroll','touchstart'].forEach(evt => {
    window.addEventListener(evt, refresh, {passive:true});
  });

  setInterval(() => {
    if (isAuthenticated() && isSessionExpired()){
      clearAuth();
      if (window.location.hash !== '#login'){
        window.location.hash = 'login';
      }
      render();
      showToast('info', 'Sesión expirada', 'Se cerró por inactividad.');
    }
  }, 60 * 1000);
}

function attachVentasBehavior(){
  const downloadBtn = document.getElementById('downloadVentasExcelBtn');
  const supplierFilter = document.getElementById('ventasSupplierFilter');
  const tableBody = document.getElementById('ventasTableBody');
  const prevBtn = document.getElementById('ventasPrevBtn');
  const nextBtn = document.getElementById('ventasNextBtn');
  const pageNumber = document.getElementById('ventasPageNumber');
  const totalPagesEl = document.getElementById('ventasTotalPages');
  const pageSizeSelect = document.getElementById('ventasPageSize');
  if (!downloadBtn || !tableBody || !supplierFilter || !prevBtn || !nextBtn || !pageNumber || !totalPagesEl || !pageSizeSelect) return;

  let currentPage = 1;
  let pageSize = parseInt(pageSizeSelect.value, 10) || 15;
  let currentSupplier = 'all';

  function buildSalesProducts(){
    const salesProducts = [];
    SUPPLIERS.forEach((s, idx) => {
      s.products.forEach(p => {
        const total = getSalesTotal(p);
        if (total > 0 && (currentSupplier === 'all' || s.name === currentSupplier)){
          salesProducts.push({ product: p, supplier: s, supplierIdx: idx, total, recent7: getSalesRecent(p, 7), velocity: getSalesVelocity(p) });
        }
      });
    });
    salesProducts.sort((a, b) => b.total - a.total || b.velocity - a.velocity);
    return salesProducts;
  }

  function renderSalesTable(){
    const salesProducts = buildSalesProducts();
    const totalItems = salesProducts.length;
    const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
    if (currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage - 1) * pageSize;
    const paged = salesProducts.slice(start, start + pageSize);

    tableBody.innerHTML = paged.map((entry, i) => `
      <tr>
        <td class="num">${start + i + 1}</td>
        <td class="prod-name">${esc(entry.product.producto)}</td>
        <td><a href="#sup:${entry.supplierIdx}">${esc(entry.supplier.name)}</a></td>
        <td class="num">${fmtInt(entry.total)}</td>
        <td class="num">${fmtInt(entry.recent7)}</td>
        <td class="num">${fmtN(entry.velocity, 1)} u/día</td>
        <td class="num">${fmtN(entry.product.stock, 0)}</td>
        <td>${esc(entry.product.ultimaVenta ? entry.product.ultimaVenta.slice(0, 10) : '—')}</td>
        <td class="actions-cell">
          <button class="icon-btn detail-btn" title="Ver detalle de ventas"
            data-sup="${entry.supplierIdx}"
            data-uid="${esc(entry.product._uid || '')}">🧾</button>
        </td>
      </tr>
    `).join('') || `<tr><td colspan="9" style="text-align:center;color:var(--text-faint);padding:20px;">Aún no hay ventas registradas.</td></tr>`;

    pageNumber.textContent = totalItems === 0 ? '0' : currentPage;
    totalPagesEl.textContent = totalItems === 0 ? '0' : totalPages;
    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= totalPages;

    // Botones de detalle
    tableBody.querySelectorAll('.detail-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const supIdx = parseInt(btn.dataset.sup, 10);
        const uid = btn.dataset.uid;
        openVentasDetailModal(supIdx, uid, renderSalesTable);
      });
    });
  }

  function exportVentas(){
    const salesProducts = buildSalesProducts();
    if (!salesProducts.length) {
      showToast('info', 'Sin datos', 'No hay ventas registradas para exportar.');
      return;
    }
    const headers = ['#', 'Producto', 'Proveedor', 'Vendidas', 'Últ. 7 días', 'Rotación (u/día)', 'Stock', 'Última venta'];
    const rows = salesProducts.map((entry, i) => [
      i + 1,
      entry.product.producto || '—',
      entry.supplier.name || '—',
      fmtInt(entry.total),
      fmtInt(entry.recent7),
      fmtN(entry.velocity, 1),
      fmtN(entry.product.stock, 0),
      entry.product.ultimaVenta ? entry.product.ultimaVenta.slice(0, 10) : '—'
    ]);
    const csv = [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\r\n');
    const blob = new Blob([csv], { type: 'application/vnd.ms-excel;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `agromin-ranking-ventas-${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a);

function openVentasDetailModal(supIdx, uid, onUpdate){
  const s = SUPPLIERS[supIdx];
  if (!s) return;
  const p = s.products.find(pr => pr._uid === uid);
  if (!p) return;

  function buildModalContent(){
    const ventas = Array.isArray(p.ventas) ? [...p.ventas].reverse() : [];
    const rows = ventas.length ? ventas.map((v, i) => `
      <tr>
        <td class="num">${ventas.length - i}</td>
        <td>${esc(v.fecha ? v.fecha.slice(0,10) : '—')}</td>
        <td>${esc(v.fecha ? v.fecha.slice(11,16) : '—')}</td>
        <td class="num">${fmtN(v.cantidad, 0)}</td>
        <td>${esc(v.nota || '—')}</td>
        <td class="actions-cell">
          <button class="icon-btn delete-btn venta-del-btn" title="Eliminar venta y devolver stock"
            data-saleid="${esc(v.id || '')}">🗑</button>
        </td>
      </tr>
    `).join('') : `<tr><td colspan="6" style="text-align:center;color:var(--text-faint);padding:16px;">Sin registros de venta.</td></tr>`;

    return `
      <div class="modal-eyebrow">Historial de ventas</div>
      <div class="modal-title">${esc(p.producto)}</div>
      <div class="modal-sub">${esc(s.name)} · Stock actual: <strong>${fmtN(p.stock, 0)}</strong> unidades</div>
      <div class="table-scroll">
        <table class="data-table">
          <thead><tr>
            <th>#</th><th>Fecha</th><th>Hora</th><th class="num">Cantidad</th><th>Nota</th><th></th>
          </tr></thead>
          <tbody id="ventasDetailBody">${rows}</tbody>
        </table>
      </div>
    `;
  }

  openModal(buildModalContent());

  function attachDeleteBtns(){
    document.querySelectorAll('.venta-del-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const saleId = btn.dataset.saleid;
        const venta = (p.ventas || []).find(v => v.id === saleId);
        if (!venta) return;

        const { isConfirmed } = await Swal.fire({
          title: '¿Eliminar esta venta?',
          html: `Se devolverán <strong>${fmtN(venta.cantidad, 0)}</strong> unidades al stock de <strong>${esc(p.producto)}</strong>.`,
          icon: 'warning',
          showCancelButton: true,
          confirmButtonText: 'Sí, eliminar',
          cancelButtonText: 'Cancelar',
          customClass: { popup: 'agromin-swal' }
        });
        if (!isConfirmed) return;

        // Devolver stock y eliminar registro
        p.stock = (Number(p.stock) || 0) + Number(venta.cantidad);
        p.ventas = p.ventas.filter(v => v.id !== saleId);
        p.ventasTotal = getSalesTotal(p);
        p.ultimaVenta = p.ventas.length ? p.ventas[p.ventas.length - 1].fecha : null;

        recalcSupplierMeta(s);
        saveState();
        if (onUpdate) onUpdate();

        // Refrescar contenido del modal
        document.getElementById('modalBody').innerHTML = buildModalContent();
        attachDeleteBtns();
        showToast('success', 'Venta eliminada', `Se devolvieron ${fmtN(venta.cantidad, 0)} unidades al stock.`);
      });
    });
  }

  attachDeleteBtns();
}

function attachStockBajoBehavior(){
  const pdfBtn = document.getElementById('downloadStockBajoPDF');
  const prevBtn = document.getElementById('stockBajoPrevBtn');
  const nextBtn = document.getElementById('stockBajoNextBtn');
  const pageSizeSelect = document.getElementById('stockBajoPageSize');
  const pageNumber = document.getElementById('stockBajoPageNumber');
  const totalPagesEl = document.getElementById('stockBajoTotalPages');
  const tableBody = document.getElementById('stockBajoTableBody');

  if (!tableBody) return;
  if (pdfBtn) pdfBtn.addEventListener('click', downloadStockBajoPDF);

  let currentPage = 1;
  let pageSize = parseInt(pageSizeSelect?.value, 10) || 15;

  function getAllLow(){
    const list = [];
    SUPPLIERS.forEach((s, idx) => {
      s.products.forEach(p => {
        if ((p.estadoStock||'').toUpperCase().includes('BAJO')){
          list.push({
            producto: p.producto || '—',
            empresa: s.name,
            contenido: p.contenido || '—',
            stock: fmtN(p.stock,0),
            precioSistema: fmtS(p.precioSistema),
            diferencia: fmtN(p.diferencia,3),
            supIdx: idx
          });
        }
      });
    });
    return list;
  }

  function renderPage(){
    const rows = getAllLow();
    const totalItems = rows.length;
    const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
    if (currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage - 1) * pageSize;
    const paged = rows.slice(start, start + pageSize);

    tableBody.innerHTML = paged.map(p => `
      <tr>
        <td class="prod-name">${esc(p.producto)}</td>
        <td><a href="#sup:${p.supIdx}">${esc(p.empresa)}</a></td>
        <td>${esc(p.contenido)}</td>
        <td class="num">${p.stock}</td>
        <td class="num">${p.precioSistema}</td>
        <td class="num neg">${p.diferencia}</td>
      </tr>
    `).join('') || `<tr><td colspan="6" style="text-align:center;color:var(--text-faint);padding:20px;">Sin registros</td></tr>`;

    if (pageNumber) pageNumber.textContent = totalItems === 0 ? '0' : currentPage;
    if (totalPagesEl) totalPagesEl.textContent = totalItems === 0 ? '0' : totalPages;
    if (prevBtn) prevBtn.disabled = currentPage <= 1;
    if (nextBtn) nextBtn.disabled = currentPage >= totalPages;
  }

  if (pageSizeSelect){
    pageSizeSelect.addEventListener('change', (e) => {
      pageSize = parseInt(e.target.value, 10) || 15;
      currentPage = 1;
      renderPage();
    });
  }

  if (prevBtn){
    prevBtn.addEventListener('click', () => {
      if (currentPage <= 1) return;
      currentPage -= 1;
      renderPage();
    });
  }

  if (nextBtn){
    nextBtn.addEventListener('click', () => {
      currentPage += 1;
      renderPage();
    });
  }

  renderPage();
}

function downloadStockBajoPDF(){
  const allLow = [];
  SUPPLIERS.forEach((s, idx) => {
    s.products.forEach(p => {
      if ((p.estadoStock||'').toUpperCase().includes('BAJO')){
        allLow.push({ empresa: s.name, producto: p.producto, contenido: p.contenido, stock: p.stock, precioSistema: p.precioSistema, diferencia: p.diferencia });
      }
    });
  });
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'pt', format:'letter' });

  const margin = 40;
  const pageWidth = doc.internal.pageSize.width;
  const pageHeight = doc.internal.pageSize.height;
  const companyTitle = 'SOLUCIONES AGROMIN';
  const subtitle = 'Detalle de productos en alerta - Stock bajo';
  const generated = `Generado: ${new Date().toLocaleString('es-PE')}`;

  // Compact styled header (more spacing)
  const topBarY = 20;
  const topBarH = 56;
  doc.setFillColor(28,58,40); // dark green
  doc.rect(0, topBarY, pageWidth, topBarH, 'F');
  doc.setFontSize(16);
  doc.setTextColor('#ffffff');
  doc.text(companyTitle, pageWidth/2, topBarY + 26, { align: 'center' });
  doc.setFontSize(10);
  doc.setTextColor('#f5f9f6');
  doc.text(subtitle, pageWidth/2, topBarY + 44, { align: 'center' });
  doc.setFontSize(8);
  doc.setTextColor('#56695a');
  doc.text(generated, margin, topBarY + topBarH + 8);

  // Table: Producto, Empresa, Contenido, Stock (compact)
  const headers = ['Producto','Empresa','Contenido','Stock'];
  const contentWidth = pageWidth - margin * 2;
  let colWidths = [0.55, 0.30, 0.10, 0.05].map(p => Math.floor(p * contentWidth));

  const rows = allLow.map(item => ({
    producto: item.producto || '—',
    empresa: item.empresa || '—',
    contenido: item.contenido || '—',
    stock: fmtN(item.stock,0)
  }));

  const fontSize = 8;
  const lineHeight = 12;
  let y = topBarY + topBarH + 28;
  const headerHeight = lineHeight + 6;

  function drawHeader(){
    let x = margin;
    doc.setFillColor(217,237,223); // light green header
    doc.setDrawColor(200);
    for (let i=0;i<headers.length;i++){
      doc.rect(x, y - headerHeight + 2, colWidths[i], headerHeight, 'F');
      doc.setFontSize(fontSize);
      doc.setTextColor('#1c2a1f');
      doc.text(headers[i], x + 4, y - 2);
      x += colWidths[i];
    }
    doc.setDrawColor(200);
    doc.line(margin, y + 6, pageWidth - margin, y + 6);
    y += headerHeight + 2;
  }

  drawHeader();

  // Rows with subtle striping
  for (let r=0;r<rows.length;r++){
    const row = rows[r];
    const prodLines = doc.splitTextToSize(String(row.producto), colWidths[0] - 8);
    const empLines = doc.splitTextToSize(String(row.empresa), colWidths[1] - 8);
    const contLines = doc.splitTextToSize(String(row.contenido), colWidths[2] - 8);
    const stockLines = [String(row.stock)];
    const maxLines = Math.max(prodLines.length, empLines.length, contLines.length, stockLines.length);
    const cellHeight = maxLines * lineHeight + 6;

    if (y + cellHeight > pageHeight - 60){
      const pnum = doc.internal.getNumberOfPages();
      doc.setFontSize(8);
      doc.setTextColor('#999');
      doc.text(`Página ${pnum}`, pageWidth - margin - 40, pageHeight - 30);
      doc.addPage();
      y = margin + 20;
      drawHeader();
    }

    // stripe
    if (r % 2 === 0){ doc.setFillColor(250,250,250); doc.rect(margin, y - (lineHeight-4), contentWidth, cellHeight - 4, 'F'); }

    let x = margin;
    const cells = [prodLines, empLines, contLines, stockLines];
    for (let c=0;c<cells.length;c++){
      doc.setDrawColor(230);
      doc.rect(x, y - (lineHeight-4), colWidths[c], cellHeight - 4, 'S');
      doc.setFontSize(fontSize);
      doc.setTextColor('#1c2a1f');
      const lines = cells[c];
      for (let li=0; li<lines.length; li++){
        const txt = lines[li];
        const textY = y + li*lineHeight - 2;
        if (c === 3){
          const textW = doc.getTextWidth(txt);
          doc.text(txt, x + colWidths[c] - 6 - textW, textY);
        } else {
          doc.text(txt, x + 4, textY);
        }
      }
      x += colWidths[c];
    }
    y += cellHeight;
  }

  // Footer page number
  const pnum = doc.internal.getNumberOfPages();
  doc.setFontSize(8);
  doc.setTextColor('#999');
  doc.text(`Página ${pnum}`, pageWidth - margin - 40, pageHeight - 30);

  doc.save('stock-bajo-detalle.pdf');
}

      return;
    }
    recalcAll(nc, isNaN(ns) ? DATA.cambioDolar.tcSunat : ns);
    SUPPLIERS.forEach(sup => {
      sup.meta.fechaReporte = new Date().toISOString();
    });
    saveState();
    buildNav();
    buildTopbar();
    status.textContent = `Actualizado: T.C. Comercial ${fmtN(nc,3)} aplicado a todos los productos en USD y por tonelada.`;
    status.style.color = 'var(--lime)';
    showToast('success', 'Tipo de cambio guardado', 'El cambio se mantendrá al recargar esta página en este navegador.');
    render();
  });
}

function cellHTML(col, val, pi){
  if (col.type === 'actions'){
    return `<td class="actions-cell">
      <button class="icon-btn detail-btn" data-pi="${pi}" title="Ver detalles" aria-label="Ver detalles">${ICON_EYE}</button>
      <button class="icon-btn edit-btn" data-pi="${pi}" title="Editar producto" aria-label="Editar producto">${ICON_EDIT}</button>
      <button class="icon-btn lot-btn" data-pi="${pi}" title="Ver lotes" aria-label="Ver lotes">📦</button>
      <button class="icon-btn delete-btn" data-pi="${pi}" title="Enviar a inactivos" aria-label="Enviar a inactivos">${ICON_DELETE}</button>
    </td>`;
  }
  if (col.type === 'text'){
    return `<td class="${col.key==='producto'?'prod-name':''}">${esc(val ?? '—')}</td>`;
  }
  if (col.type === 'pill'){
    const e = (val||'').toUpperCase();
    const cls = e.includes('BAJO') ? 'bajo' : (e.includes('OPTIM')||e.includes('ÓPTIM')) ? 'optimo' : 'other';
    return `<td><span class="pill ${cls}">${esc(val||'—')}</span></td>`;
  }
  if (col.type === 'diff'){
    const n = Number(val);
    const cls = n < 0 ? 'neg' : (n > 0 ? 'pos' : '');
    return `<td class="num ${cls}">${fmtN(val,3)}</td>`;
  }
  if (col.type === 'money'){
    const extraClass = col.key === 'flete' ? 'flete-cell' : (col.key === 'imptoRenta' || col.key === 'rentaProd') ? 'renta-cell' : '';
    return `<td class="num money-cell ${extraClass}">${fmtS(val)}</td>`;
  }
  if (col.type === 'usd') return `<td class="num usd-cell">${fmtUSD(val)}</td>`;
  if (col.type === 'int') return `<td class="num">${fmtN(val,0)}</td>`;
  return `<td class="num">${val ?? '—'}</td>`;
}

function createSupplier({ name, schema = 'SOLES' } = {}){
  const normalizedName = (name || '').trim() || `Nuevo proveedor ${SUPPLIERS.length + 1}`;
  const normalizedSchema = ['SOLES', 'USD', 'TON'].includes(schema) ? schema : 'SOLES';
  const supplier = {
    name: normalizedName,
    schema: normalizedSchema,
    meta: {
      fechaReporte: new Date().toISOString(),
      tcComercial: DATA.cambioDolar.tcComercial,
      tcSunat: DATA.cambioDolar.tcSunat,
      impuestoRenta: 0.02,
      ingresoBruto: 0,
      totalDeducciones: 0,
      utilidadNeta: 0
    },
    products: [],
    inactiveProducts: []
  };
  DATA.suppliers.push(supplier);
  SUPPLIERS = DATA.suppliers;
  saveState();
  localStorage.setItem(STORAGE_BACKUP_KEY, JSON.stringify(DATA));
  return SUPPLIERS.length - 1;
}

function updateSupplierSchema(s, newSchema){
  if (!s || !newSchema || s.schema === newSchema) return false;
  const tc = s.meta.tcComercial || DATA.cambioDolar.tcComercial;
  s.schema = newSchema;
  s.products.forEach(p => {
    if (newSchema === 'USD'){
      if (!p.precioOrigUSD || p.precioOrigUSD === 0){
        p.precioOrigUSD = tc > 0 ? ((p.costoUnit||0) - (p.flete||0) - (p.rentaProd||0)) / tc : 0;
      }
      p.bolsasTon = p.bolsasTon || 1;
      p.impuestoBolsa = p.impuestoBolsa || 0;
    } else if (newSchema === 'TON'){
      p.bolsasTon = p.bolsasTon || 1;
      if (!p.precioTonUSD || p.precioTonUSD === 0){
        p.precioTonUSD = tc > 0 ? (((p.costoUnit||0) - (p.flete||0) - (p.impuestoBolsa||0)) / tc) * p.bolsasTon : 0;
      }
    } else {
      p.precioCompra = p.precioCompra || p.costoUnit || 0;
    }
    recalcSingleProduct(s, p);
  });
  recalcSupplierMeta(s);
  return true;
}

function attachProductLotsBehavior(s, supIdx, pi){
  const p = s.products[pi];
  const updateLotsTable = () => {
    const tableBody = document.getElementById('lotsTableBody');
    const stockValue = document.getElementById('lotStockValue');
    if (!tableBody) return;
    const rows = (Array.isArray(p.lotes) ? p.lotes : []).map((lot, li) => `
      <tr>
        <td>${esc(lot.fecha ? lot.fecha.slice(0,10) : '—')}</td>
        <td class="num">${fmtN(lot.cantidad,0)}</td>
        <td class="num">${fmtS(lot.precioUnitario)}</td>
        <td class="num">${fmtS(lot.importe)}</td>
        <td><button class="btn-secondary btn-delete-lot" data-li="${li}">Eliminado de lote</button></td>
      </tr>
    `).join('') || `<tr><td colspan="5" style="text-align:center;color:var(--text-faint);padding:20px;">Aún no hay lotes registrados para este producto.</td></tr>`;
    tableBody.innerHTML = rows;
    if (stockValue) stockValue.textContent = fmtN(p.stock,0);
  };

  const backBtn = document.getElementById('backToSupplierFromLotsBtn');
  const addBtn = document.getElementById('addLotSaveBtn');
  const cantidadInput = document.getElementById('lotCantidad');
  const precioInput = document.getElementById('lotPrecioUnitario');
  const notaInput = document.getElementById('lotNota');

  if (backBtn){
    backBtn.addEventListener('click', () => {
      window.location.hash = `sup:${supIdx}`;
    });
  }
  if (addBtn){
    addBtn.addEventListener('click', () => {
      const cantidad = Math.max(0, parseInt(cantidadInput.value, 10) || 0);
      const precioUnitario = parseFloat(precioInput.value) || 0;
      if (cantidad <= 0 || precioUnitario <= 0){
        Swal.fire({ title: 'Datos incompletos', text: 'Ingresa cantidad y precio unitario válidos.', icon: 'warning', customClass: { popup: 'agromin-swal' } });
        return;
      }
      const importe = cantidad * precioUnitario;
      const lot = {
        id: `${p._uid || ''}-lot-${Date.now()}`,
        fecha: new Date().toISOString(),
        cantidad,
        precioUnitario,
        importe,
        nota: notaInput.value.trim() || '',
      };
      p.lotes = Array.isArray(p.lotes) ? p.lotes : [];
      p.lotes.push(lot);
      p.stock = (Number(p.stock) || 0) + cantidad;
      recalcSingleProduct(s, p);
      p.prevStock = p.stock;
      s.meta.fechaReporte = new Date().toISOString();
      recalcSupplierMeta(s);
      saveState();
      localStorage.setItem(STORAGE_BACKUP_KEY, JSON.stringify(DATA));
      buildNav();
      buildTopbar();
      cantidadInput.value = '0';
      precioInput.value = '0';
      notaInput.value = '';
      updateLotsTable();
      showToast('success', 'Lote agregado', `Stock actualizado en ${fmtInt(cantidad)} unidades.`);
    });
  }

  document.getElementById('content').addEventListener('click', (e) => {
    const deleteBtn = e.target.closest('.btn-delete-lot');
    if (!deleteBtn) return;
    const li = parseInt(deleteBtn.dataset.li, 10);
    if (Number.isNaN(li)) return;
    const lot = (p.lotes || [])[li];
    if (!lot) return;
    p.lotes.splice(li, 1);
    p.stock = Math.max(0, (Number(p.stock) || 0) - (Number(lot.cantidad) || 0));
    recalcSingleProduct(s, p);
    p.prevStock = p.stock;
    s.meta.fechaReporte = new Date().toISOString();
    recalcSupplierMeta(s);
    saveState();
    localStorage.setItem(STORAGE_BACKUP_KEY, JSON.stringify(DATA));
    buildNav();
    buildTopbar();
    updateLotsTable();
    showToast('success', 'Lote eliminado', 'Se removió el lote y se actualizó el stock.');
  });
}

  const tableBody = document.getElementById('inactiveTableBody');

      if (!currentSearch) return true;
      const term = currentSearch;
      return (p.producto||'').toLowerCase().includes(term) || (p.contenido||'').toLowerCase().includes(term);
    });

    tableBody.innerHTML = items.map(p => `
      <tr data-uid="${esc(p._uid||'')}">
        <td class="prod-name">${esc(p.producto||'—')}</td>
        <td>${esc(p.contenido||'—')}</td>
        <td class="num">${fmtN(p.stock,0)}</td>
        <td><span class="pill ${ (p.estadoStock||'').toUpperCase().includes('BAJO') ? 'bajo':'optimo'}">${esc(p.estadoStock||'—')}</span></td>
        <td class="num">${fmtS(p.precioSistema)}</td>
        <td>
          <button class="icon-btn restore-btn" data-uid="${esc(p._uid||'')}" title="Restaurar" aria-label="Restaurar">↺</button>
          <button class="icon-btn delete-perm-btn" data-uid="${esc(p._uid||'')}" title="Eliminar permanentemente" aria-label="Eliminar">🗑</button>
        </td>
      </tr>
    `).join('') || `<tr><td colspan="6" style="text-align:center;color:var(--text-faint);padding:20px;">No hay productos inactivos que coincidan con el filtro.</td></tr>`;
  }

  chips.forEach(chip => chip.addEventListener('click', () => {
    chips.forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    render();
  }));

  searchInput.addEventListener('input', (e) => {
    currentSearch = e.target.value.toLowerCase();
    render();
  });

  if (backBtn){
    backBtn.addEventListener('click', () => {
      window.location.hash = `sup:${idx}`;
    });
  }

  document.getElementById('content').addEventListener('click', (e) => {
    const restoreBtn = e.target.closest('.restore-btn');
    const delBtn = e.target.closest('.delete-perm-btn');
    if (restoreBtn){
      const uid = restoreBtn.dataset.uid;
      if (!uid) return;
      restoreFromInactive(s, uid);
      showToast('success', 'Producto restaurado', 'Ya está de vuelta en el catálogo activo.');
      buildNav(); buildTopbar(); window.location.hash = `sup:${idx}`;
      return;
    }
    if (delBtn){
      const uid = delBtn.dataset.uid;
      if (!uid) return;
      Swal.fire({
        title: 'Eliminar permanentemente',
        text: '¿Estás seguro? Esta acción no se puede deshacer.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Eliminar',
        cancelButtonText: 'Cancelar',
        customClass: { popup: 'agromin-swal' }
      }).then(res => {
        if (res.isConfirmed){
          const idx = (s.inactiveProducts || []).findIndex(p => (p._uid||'') === uid);
          if (idx > -1){
            s.inactiveProducts.splice(idx, 1);
            saveState();
            showToast('success','Eliminado','Producto eliminado permanentemente.');
            render();
            buildNav(); buildTopbar();
          }
        }
      });
      return;
    }
  });
}

/* ---------------------------- GASTOS Y DEDUCCIONES (independiente, editable) ---------------------------- */

function gastosStorageKey(supplierName){
  return 'agromin_gastos::' + supplierName;
}
function loadGastos(supplierName){
  try{
    const raw = localStorage.getItem(gastosStorageKey(supplierName));
    return raw ? JSON.parse(raw) : [];
  } catch(e){ return []; }
}
function saveGastos(supplierName, arr){
  try{ localStorage.setItem(gastosStorageKey(supplierName), JSON.stringify(arr)); } catch(e){ /* storage unavailable */ }
}

function attachGastosPanel(s){
  const body = document.getElementById('gastosBody');
  const totalEl = document.getElementById('gastosTotal');
  const addBtn = document.getElementById('addGastoBtn');
  if (!body) return;
  let gastos = loadGastos(s.name);

  function recalcTotal(){
    const total = gastos.reduce((a,g) => a + (parseFloat(g.monto) || 0), 0);
    totalEl.textContent = fmtS(total);
    recalcSupplierMeta(s);
    const kIngreso = document.getElementById('kpiIngreso');
    const kDeducciones = document.getElementById('kpiDeducciones');
    const kUtilidad = document.getElementById('kpiUtilidad');
    if (kIngreso) kIngreso.textContent = fmtS(s.meta.ingresoBruto);
    if (kDeducciones) kDeducciones.textContent = fmtS(s.meta.totalDeducciones);
    if (kUtilidad) kUtilidad.textContent = fmtS(s.meta.utilidadNeta);
  }

  function paint(){
    body.innerHTML = gastos.length ? gastos.map((g,i) => `
      <tr data-i="${i}">
        <td><input class="gastos-input" data-field="concepto" placeholder="Ej. Flete interno" value="${esc(g.concepto||'')}"/></td>
        <td><input class="gastos-input" data-field="categoria" placeholder="Categoría" value="${esc(g.categoria||'')}"/></td>
        <td class="num"><input class="gastos-input monto" data-field="monto" type="number" step="0.01" placeholder="0.00" value="${g.monto ?? ''}"/></td>
        <td><button class="gasto-del" data-i="${i}" title="Eliminar">×</button></td>
      </tr>`).join('')
      : `<tr><td colspan="4" style="text-align:center;color:var(--text-faint);padding:16px;">Sin gastos registrados todavía. Usa "Agregar gasto" para empezar.</td></tr>`;

    body.querySelectorAll('.gastos-input').forEach(inp => {
      inp.addEventListener('input', (e) => {
        const tr = e.target.closest('tr');
        const i = parseInt(tr.dataset.i, 10);
        gastos[i][e.target.dataset.field] = e.target.value;
        saveGastos(s.name, gastos);
        recalcTotal();
      });
    });
    body.querySelectorAll('.gasto-del').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = parseInt(btn.dataset.i, 10);
        gastos.splice(i, 1);
        saveGastos(s.name, gastos);
        paint();
        recalcTotal();
      });
    });
    recalcTotal();
  }

  addBtn.addEventListener('click', () => {
    gastos.push({concepto:'', categoria:'', monto:0});
    saveGastos(s.name, gastos);
    paint();
  });

  paint();
}

function attachSupplierBehavior(idx){
  const s = SUPPLIERS[idx];
  const cols = schemaColumns(s.schema);
  let currentFilter = 'all';
  let currentSearch = '';
  let sortCol = null, sortDir = 1;

  const tbody = document.getElementById('supTableBody');
  const chips = document.querySelectorAll('#filterChips .chip');
  const searchInput = document.getElementById('supSearch');
  const headers = document.querySelectorAll('#supTable thead th');
  const content = document.getElementById('content');
  const viewInactiveBtn = document.getElementById('viewInactiveBtn');
  const addProductBtn = document.getElementById('addProductBtn');
  const editSchemaBtn = document.getElementById('editSupplierSchemaBtn');
  const prevBtn = document.getElementById('supPrevPageBtn');
  const nextBtn = document.getElementById('supNextPageBtn');
  const pageNumber = document.getElementById('supPageNumber');
  const totalPagesEl = document.getElementById('supTotalPages');
  const pageSizeSelect = document.getElementById('supPageSize');

  let currentPage = 1;
  let pageSize = parseInt(pageSizeSelect?.value, 10) || 15;

  function applyAndRender(){
    let items = s.products.map((p,pi)=>({p,pi}));
    if (currentFilter === 'optimo') items = items.filter(x => !(x.p.estadoStock||'').toUpperCase().includes('BAJO'));
    if (currentFilter === 'bajo') items = items.filter(x => (x.p.estadoStock||'').toUpperCase().includes('BAJO'));
    if (currentSearch) items = items.filter(x => (x.p.producto||'').toLowerCase().includes(currentSearch));
    if (sortCol !== null){
      const col = cols[sortCol];
      items.sort((a,b) => {
        let va = a.p[col.key], vb = b.p[col.key];
        if (typeof va === 'string' || typeof vb === 'string'){
          va = (va||'').toString().toLowerCase(); vb = (vb||'').toString().toLowerCase();
          return va < vb ? -1*sortDir : va > vb ? 1*sortDir : 0;
        }
        va = Number(va)||0; vb = Number(vb)||0;
        return (va-vb)*sortDir;
      });
    }

    const totalItems = items.length;
    const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
    if (currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage - 1) * pageSize;
    const pagedItems = items.slice(start, start + pageSize);

    tbody.innerHTML = pagedItems.map(({p,pi}) => `<tr data-pi="${pi}">${cols.map(c => cellHTML(c, p[c.key], pi)).join('')}</tr>`).join('')
      || `<tr><td colspan="${cols.length}" style="text-align:center;color:var(--text-faint);padding:20px;">Sin resultados</td></tr>`;

    if (pageNumber) pageNumber.textContent = totalItems === 0 ? '0' : currentPage;
    if (totalPagesEl) totalPagesEl.textContent = totalItems === 0 ? '0' : totalPages;
    if (prevBtn) prevBtn.disabled = currentPage <= 1;
    if (nextBtn) nextBtn.disabled = currentPage >= totalPages;
  }

  chips.forEach(chip => chip.addEventListener('click', () => {
    chips.forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    currentPage = 1;
    applyAndRender();
  }));

  searchInput.addEventListener('input', (e) => {
    currentSearch = e.target.value.toLowerCase();
    currentPage = 1;
    applyAndRender();
  });

  if (pageSizeSelect){
    pageSizeSelect.addEventListener('change', (e) => {
      pageSize = parseInt(e.target.value, 10) || 12;
      currentPage = 1;
      applyAndRender();
    });
  }

  if (prevBtn){
    prevBtn.addEventListener('click', () => {
      if (currentPage <= 1) return;
      currentPage -= 1;
      applyAndRender();
    });
  }

  if (nextBtn){
    nextBtn.addEventListener('click', () => {
      currentPage += 1;
      applyAndRender();
    });
  }

  headers.forEach((th, ci) => {
    if (cols[ci].type === 'actions') return; // no ordenar la columna de acciones
    th.addEventListener('click', () => {
      if (sortCol === ci) sortDir *= -1; else { sortCol = ci; sortDir = 1; }
      headers.forEach(h=>h.classList.remove('sorted-asc','sorted-desc'));
      th.classList.add(sortDir === 1 ? 'sorted-asc' : 'sorted-desc');
      applyAndRender();
    });
  });

  if (editSchemaBtn){
    editSchemaBtn.addEventListener('click', () => {
      openSupplierSchemaModal(s, idx, () => {
        buildNav(); buildTopbar(); render();
      });
    });
  }

  if (viewInactiveBtn) {
    viewInactiveBtn.addEventListener('click', () => {
      window.location.hash = `sup-inactivos:${idx}`;
    });
  }

  if (addProductBtn) {
    addProductBtn.addEventListener('click', () => {
      openAddProductModal(s, idx, () => {
        buildNav(); buildTopbar(); render();
        showToast('success', 'Producto agregado', 'El producto ahora está en el catálogo activo.');
      });
    });
  }

  // Delegación de eventos para los botones de Ver detalles / Editar / Eliminar / Restaurar
  content.onclick = (e) => {
    const detailBtn = e.target.closest('.detail-btn');
    const editBtn = e.target.closest('.edit-btn');
    const lotBtn = e.target.closest('.lot-btn');
    const deleteBtn = e.target.closest('.delete-btn');
    const restoreBtn = e.target.closest('.restore-btn');

    if (detailBtn){
      const pi = parseInt(detailBtn.dataset.pi, 10);
      openProductDetailModal(s, pi);
    } else if (editBtn){
      const pi = parseInt(editBtn.dataset.pi, 10);
      openProductEditModal(s, idx, pi, applyAndRender);
    } else if (lotBtn){
      const pi = parseInt(lotBtn.dataset.pi, 10);
      if (!Number.isNaN(pi)) window.location.hash = `sup-lotes:${idx}:${pi}`;
    } else if (deleteBtn){
      const pi = parseInt(deleteBtn.dataset.pi, 10);
      const product = s.products[pi];
      if (!product) return;
      Swal.fire({
        title: '¿Enviar a inactivos?',
        text: `El producto "${product.producto || 'sin nombre'}" quedará oculto del catálogo activo.`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Sí, enviar',
        cancelButtonText: 'Cancelar',
        customClass: { popup: 'agromin-swal' }
      }).then((res) => {
        if (res.isConfirmed) {
          moveToInactive(s, product);
          buildNav(); buildTopbar(); render();
          showToast('success', 'Producto enviado a inactivos', 'Podrás restaurarlo desde la vista de inactivos.');
        }
      });
    } else if (restoreBtn){
      const uid = restoreBtn.dataset.uid;
      if (!uid) return;
      restoreFromInactive(s, uid);
      buildNav(); buildTopbar(); render();
      showToast('success', 'Producto restaurado', 'Se devolvió al catálogo activo.');
    }
  };
}

/* ---------------------------- GLOBAL SEARCH ---------------------------- */

document.getElementById('globalSearch').addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  // Si el input se limpia, volver al dashboard
  if (q.length === 0){
    window.location.hash = 'dashboard';
    return;
  }
});
document.getElementById('globalSearch').addEventListener('keydown', (e) => {
  if (e.key === 'Enter'){
    const q = e.target.value.trim().toLowerCase();
    if (!q) return;
    window.location.hash = 'search:' + encodeURIComponent(q);
  }
});


function viewGlobalSearch(q){
  let results = [];
  SUPPLIERS.forEach((s, idx) => {
    s.products.forEach(p => {
      if ((p.producto||'').toLowerCase().includes(q)){
        results.push({...p, empresa: s.name, supIdx: idx});
      }
    });
  });
  const rows = results.map(p => `
    <tr>
      <td class="prod-name">${esc(p.producto)}</td>
      <td><a href="#sup:${p.supIdx}">${esc(p.empresa)}</a></td>
      <td>${esc(p.contenido||'—')}</td>
      <td class="num">${fmtN(p.stock,0)}</td>
      <td><span class="pill ${ (p.estadoStock||'').toUpperCase().includes('BAJO') ? 'bajo':'optimo'}">${esc(p.estadoStock||'—')}</span></td>
      <td class="num">${fmtS(p.precioSistema)}</td>
    </tr>
  `).join('');
  return `
    <div class="view-header">
      <div class="eyebrow">Búsqueda global</div>
      <div class="view-title">Resultados para "${esc(q)}"</div>
      <div class="view-desc">${results.length} producto(s) encontrado(s) en ${SUPPLIERS.length} proveedores.</div>
    </div>
    <div class="panel">
      <button id="clearSearchBtn" class="btn-secondary" style="margin-bottom: 14px; display:inline-flex; align-items:center; gap:6px;">
        ✕ Limpiar búsqueda
      </button>
      <div class="table-scroll">
        <table class="data-table">
          <thead><tr><th>Producto</th><th>Empresa</th><th>Contenido</th><th class="num">Stock</th><th>Estado</th><th class="num">Precio sistema</th></tr></thead>
          <tbody>${rows || `<tr><td colspan="6" style="text-align:center;color:var(--text-faint);padding:20px;">Sin resultados</td></tr>`}</tbody>
        </table>
      </div>
    </div>
  `;
}

setTimeout(() => {
  const clearBtn = document.getElementById('clearSearchBtn');
  if (clearBtn){
    clearBtn.addEventListener('click', () => {
      document.getElementById('globalSearch').value = '';
      window.location.hash = 'dashboard';
    });
  }
}, 10);
